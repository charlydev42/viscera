name: Build Windows VST3

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  release:
    types: [ created ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup CMake
        uses: lukka/get-cmake@latest

      - name: Configure
        run: cmake -B build -G "Visual Studio 17 2022" -A x64

      - name: Build VST3
        run: cmake --build build --config Release --target Parasite_VST3

      - name: Download pluginval
        run: |
          Invoke-WebRequest -Uri "https://github.com/Tracktion/pluginval/releases/latest/download/pluginval_Windows.zip" -OutFile pluginval.zip
          Expand-Archive -Path pluginval.zip -DestinationPath pluginval

      - name: Validate VST3 with pluginval (strictness 7, up to 3 attempts)
        id: validate
        continue-on-error: true
        run: |
          $vst3 = "build\Parasite_artefacts\Release\VST3\Parasite.vst3"
          $pluginvalExe = "pluginval\pluginval.exe"
          $maxAttempts = 3
          $passed = $false
          New-Item -ItemType Directory -Force -Path pluginval-logs | Out-Null
          for ($i = 1; $i -le $maxAttempts; $i++) {
            $logFile = "pluginval-logs\attempt-$i.log"
            Write-Host "=== pluginval attempt $i / $maxAttempts (log: $logFile) ==="
            & $pluginvalExe --strictness-level 7 --validate $vst3 2>&1 | Tee-Object -FilePath $logFile
            if ($LASTEXITCODE -eq 0) {
              Write-Host "pluginval SUCCESS on attempt $i"
              $passed = $true
              break
            }
            Write-Host "pluginval attempt $i failed (exit $LASTEXITCODE)"
          }
          if (-not $passed) {
            Write-Host "=== ALL ATTEMPTS FAILED — showing last attempt log ==="
            Get-Content "pluginval-logs\attempt-$maxAttempts.log" | Select-String -Pattern "!!!|FAIL|error" -Context 2,2
            Write-Host "::error::pluginval failed $maxAttempts times"
            "pluginval_passed=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          } else {
            "pluginval_passed=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          }

      - name: Upload pluginval logs (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pluginval-logs
          path: pluginval-logs/
          retention-days: 30

      - name: Fail job if pluginval failed
        if: steps.validate.outputs.pluginval_passed != 'true'
        run: |
          Write-Error "pluginval failed — see uploaded 'pluginval-logs' artifact for full output"
          exit 1

      - name: Collect artifact
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item -Recurse "build\Parasite_artefacts\Release\VST3\Parasite.vst3" dist\
          Compress-Archive -Path dist\Parasite.vst3 -DestinationPath Parasite-Windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Parasite-Windows-VST3
          path: Parasite-Windows.zip
          retention-days: 30

      - name: Attach to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: Parasite-Windows.zip
